<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Website title -->
    <title>FinTrackAI</title>

    <!-- Connect CSS file -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Main dashboard container -->
    <div class="dashboard">

        <!-- App heading -->
        <h1>FinTrackAI</h1>

        <!-- Balance card -->
        <div class="card">

            <!-- Balance title -->
            <h2>Current Balance</h2>

            <!-- Balance amount -->
            <p id="balance">$5000</p>

        </div>
<!-- Analytics Section -->
<div class="analytics">

    <!-- Total Deposits Card -->
    <div class="card">
        <h3>Total Deposits</h3>
        <p id="total-deposits">$0</p>
    </div>

    <!-- Total Withdrawals Card -->
    <div class="card">
        <h3>Total Withdrawals</h3>
        <p id="total-withdrawals">$0</p>
    </div>

</div>


        <!-- Amount input field -->
        <input type="number" id="amount" placeholder="Enter Amount">

        <!-- Button section -->
        <div class="button-container">

            <!-- Deposit button -->
            <button id="deposit">Deposit</button>

            <!-- Withdraw button -->
            <button id="withdraw">Withdraw</button>
        <button id="logout">Logout</button>

        </div>

        <!-- Transaction history heading -->
        <h3>Transaction History</h3>

        <!-- Transaction list -->
        <ul id="transaction-history">

        </ul>

    </div>

    <!-- Connect JavaScript -->
    <script src="script.js"></script>

</body>

</html>
